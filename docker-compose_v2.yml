# ============================================
# Agent Chiguru AI Platform — Docker Compose
# ============================================
version: "3.9"

services:
  # ─── Infrastructure ────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentchiguru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentchiguru123}
      POSTGRES_DB: ${POSTGRES_DB:-agentchiguru_db}
    ports:
      - "5532:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data_store
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentchiguru -d agentchiguru_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sf-redis
    restart: unless-stopped
    ports:
      - "6579:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: sf-kafka
    restart: unless-stopped
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list",
        ]
      interval: 10s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sf-qdrant
    restart: unless-stopped
    ports:
      - "6433:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  nginx:
    image: nginx:alpine
    container_name: sf-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: sf-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini

  disease-detection:
    build:
      context: .
      dockerfile: disease_detection/Dockerfile
    container_name: sf-disease-detection
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - upload_images:/app/uploads
      - ./ai_ml_models/mobilenetv2_plantdisease.pt:/app/model/plant_disease_model.pth:ro

  ai-advisory:
    build:
      context: .
      dockerfile: ai_advisory/Dockerfile
    container_name: sf-ai-advisory
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./shared:/app/shared

  irrigation:
    build:
      context: .
      dockerfile: irrigation/Dockerfile
    container_name: sf-irrigation
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared

  market-price:
    build:
      context: .
      dockerfile: market_price/Dockerfile
    container_name: sf-market-price
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared

  notification:
    build:
      context: .
      dockerfile: notification/Dockerfile
    container_name: sf-notification
    restart: unless-stopped
    ports:
      - "8005:8005"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  qdrant_data:
  upload_images:
